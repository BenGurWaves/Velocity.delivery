<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Velocity</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/styles.css?v=7">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Velocity<i>.</i></div>
      <div class="auth-by">by <a href="https://calyvent.com" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1px;">Calyvent</a></div>

      <!-- Login Form -->
      <div id="login-form">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to your dashboard.</p>
        <div id="login-error" class="auth-error"></div>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="you@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="Your password" required>
          </div>
          <button type="submit" class="form-btn" id="login-btn">Sign In</button>
        </form>
        <div class="auth-switch">
          Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" style="display:none">
        <h2 class="auth-title">Create your account</h2>
        <p class="auth-subtitle" id="signup-plan-text">Start your project today.</p>
        <div id="signup-error" class="auth-error"></div>
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="At least 8 characters" required minlength="8">
          </div>
          <input type="hidden" id="signup-plan" value="">
          <button type="submit" class="form-btn" id="signup-btn">Create Account</button>
        </form>
        <div class="auth-switch">
          Already have an account? <a href="#" onclick="showLogin()">Sign in</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const VALID_PLANS = ['landing', 'full', 'premium'];
    const plan = VALID_PLANS.includes(params.get('plan')) ? params.get('plan') : null;
    const action = params.get('action');

    // If already logged in, redirect immediately
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          if (plan) {
            window.location.href = '/onboard.html?plan=' + plan;
          } else {
            window.location.href = '/dashboard.html';
          }
          return;
        }
      } catch {}
    })();

    if (action === 'signup' || plan) showSignup();

    if (plan) {
      document.getElementById('signup-plan').value = plan;
      const names = { landing: 'Landing Page — $250', full: 'Full Website — $500', premium: 'Premium — $1,000' };
      document.getElementById('signup-plan-text').textContent = names[plan] || 'Start your project today.';
    }

    function showLogin() {
      document.getElementById('login-form').style.display = '';
      document.getElementById('signup-form').style.display = 'none';
    }
    function showSignup() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('signup-form').style.display = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const errEl = document.getElementById('signup-error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('signup-email').value,
            password: document.getElementById('signup-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        // If plan selected, redirect to checkout
        const selectedPlan = document.getElementById('signup-plan').value;
        if (selectedPlan) {
          window.location.href = '/onboard.html?plan=' + selectedPlan;
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>

</body>
</html>
