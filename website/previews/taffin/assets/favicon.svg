<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A3F5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#F8F8F7"/>
  
  <!-- Gemstone facet mark (stylized T for Taffin) -->
  <polygon points="32,8 48,40 40,56 24,56 16,40" fill="url(#gemGradient)" opacity="0.9"/>
  
  <!-- Inner facet detail -->
  <polygon points="32,18 42,38 36,50 28,50 22,38" fill="#1A1A1A" opacity="0.3"/>
  
  <!-- Border accent -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.4"/>
</svg>