<!DOCTYPE html>
<html>
<head>
<title>Preview - Xerjoff</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=31">
<meta name="viewport" content="width=device-width">
<style>
:root { --color-black: #0A0A0A; --color-dark: #141414; --color-cream: #C9A87C; --color-cream-muted: #8B7355; --color-orange: #B8956C; --ease-atelier: cubic-bezier(0.25, 0.1, 0.25, 1); }
* { box-sizing: border-box; }
body { background: var(--color-black); color: var(--color-cream); font-family: 'Inter', sans-serif; line-height: 1.6; margin: 0; padding: 0; overflow-x: hidden; }
@media (min-width: 900px) { body { max-width: 1200px; margin: auto; } }
h1 { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; font-size: clamp(2rem, 8vw, 4rem); margin: 0 0 1rem; }
button { background: var(--color-orange); color: var(--color-black); border: none; padding: 1rem 2rem; font-family: 'Inter', sans-serif; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: opacity 0.3s; }
button:hover { opacity: 0.9; }

/* Preloader */
#preloader {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--color-black);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s var(--ease-atelier);
}
#preloader.hidden {
  opacity: 0;
  pointer-events: none;
}
.preloader-letters {
  display: flex;
  align-items: baseline;
  font-family: 'Cinzel', Georgia, 'Times New Roman', serif;
  font-size: clamp(48px, 8vw, 80px);
  color: var(--color-cream);
}
.preloader-letter {
  opacity: 0;
  transform: translateY(40px);
  animation: letterEnter 0.8s var(--ease-atelier) forwards;
}
.preloader-letter.dot {
  color: var(--color-orange);
}
@keyframes letterEnter {
  to { opacity: 1; transform: translateY(0); }
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(10, 10, 11, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  animation: modalFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-content {
  background: linear-gradient(145deg, rgba(20, 20, 20, 0.95) 0%, rgba(10, 10, 11, 0.98) 100%);
  border: 1px solid rgba(201, 168, 124, 0.2);
  box-shadow: 
    0 25px 50px -12px rgba(0, 0, 0, 0.8),
    0 0 0 1px rgba(201, 168, 124, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  padding: 4rem 3rem;
  max-width: 560px;
  width: 90%;
  border-radius: 16px;
  text-align: center;
  animation: modalSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}
.modal-content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-orange), transparent);
  opacity: 0.5;
}
@keyframes modalSlideUp {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-title {
  color: var(--color-cream);
  margin: 0 0 1.5rem;
  font-family: 'Cinzel', Georgia, 'Times New Roman', serif;
  font-size: 2.25rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.modal-text {
  color: var(--color-cream-muted);
  margin-bottom: 2.5rem;
  line-height: 1.8;
  font-size: 1rem;
  font-weight: 300;
}
.modal-link {
  color: var(--color-orange);
  text-decoration: none;
  font-weight: 400;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  display: inline-block;
}
.modal-link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--color-orange);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-link:hover::after {
  transform: scaleX(1);
  transform-origin: left;
}
.modal-link:hover {
  opacity: 0.8;
}
.progress-container {
  margin-top: 3rem;
  position: relative;
}
.progress-bar {
  height: 1px;
  background: linear-gradient(90deg, var(--color-orange), var(--color-cream));
  margin: 0;
  width: 100%;
  animation: progress 5s linear forwards;
  position: relative;
  overflow: hidden;
}
.progress-bar::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes progress {
  from { width: 100%; }
  to { width: 0%; }
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.redirect-text {
  margin-top: 1rem;
  font-size: 0.75rem;
  color: var(--color-cream-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.7;
}

/* Footer */
footer {
  background: var(--color-black);
  padding: 6rem 2rem;
  border-top: 1px solid rgba(201, 168, 124, 0.1);
}
.footer-content {
  max-width: 4rem;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 3rem;
}
@media (min-width: 768px) {
  footer { padding: 6rem 3rem; }
  .footer-content {
    max-width: 64rem;
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-start;
  }
}
.footer-brand {
  flex: 1;
}
.footer-brand p:first-child {
  font-family: 'Cinzel', Georgia, 'Times New Roman', serif;
  font-size: 24px;
  color: var(--color-cream);
  margin: 0;
}
.footer-brand p:last-child {
  margin-top: 0.5rem;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--color-cream-muted);
}
.footer-email {
  color: var(--color-cream-muted);
  font-size: 13px;
  text-decoration: none;
  transition: color 0.5s;
}
.footer-email:hover {
  color: var(--color-cream);
}
.footer-bottom {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid rgba(201, 168, 124, 0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-bottom p {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--color-cream-muted);
  margin: 0;
}
</style>
</head>
<body>

<!-- Preloader -->
<div id="preloader">
  <div class="preloader-letters">
    <span class="preloader-letter" style="animation-delay: 0.2s">V</span>
    <span class="preloader-letter" style="animation-delay: 0.28s">e</span>
    <span class="preloader-letter" style="animation-delay: 0.36s">l</span>
    <span class="preloader-letter" style="animation-delay: 0.44s">o</span>
    <span class="preloader-letter" style="animation-delay: 0.52s">c</span>
    <span class="preloader-letter" style="animation-delay: 0.6s">i</span>
    <span class="preloader-letter" style="animation-delay: 0.68s">t</span>
    <span class="preloader-letter" style="animation-delay: 0.76s">y</span>
    <span class="preloader-letter dot" style="animation-delay: 0.84s">.</span>
  </div>
</div>

<!-- Main Content -->
<div style="padding: 4rem 2rem;">
  <h1>Hero Section</h1>
  <p style="color: var(--color-cream-muted); margin-bottom: 2rem;">Elevated copy adapted to Xerjoff.</p>
  <button onclick="openModal()">Consultation</button>
</div>

<!-- Footer -->
<footer>
  <div class="footer-content">
    <div class="footer-brand">
      <p>Velocity.</p>
      <p>Digital Ateliers</p>
    </div>
    <a href="mailto:atelier@velocity.delivery" class="footer-email">
      atelier@velocity.delivery
    </a>
  </div>
  <div class="footer-bottom">
    <p>Four commissions per year</p>
    <p>2026</p>
  </div>
</footer>

<script>
// Preloader
window.addEventListener('load', () => {
  setTimeout(() => {
    const preloader = document.getElementById('preloader');
    preloader.classList.add('hidden');
    setTimeout(() => {
      preloader.style.display = 'none';
    }, 500);
  }, 2500);
});

function openModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-content">
      <h2 class="modal-title">This is not a real website.</h2>
      <p class="modal-text">This is a prototype designed by Velocity — the bespoke digital atelier. It represents what your digital presence could become. Experience the vision before reality.</p>
      <a href="https://velocity.calyvent.com" class="modal-link">velocity.calyvent.com</a>
      <div class="progress-container">
        <div class="progress-bar"></div>
        <p class="redirect-text">Redirecting in 5 seconds</p>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  let redirectTimer = setTimeout(() => {
    modal.remove();
    window.location.href = 'https://velocity.calyvent.com';
  }, 5000);
  
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      clearTimeout(redirectTimer);
      modal.remove();
    }
  });
}
</script>
</body>
</html>
