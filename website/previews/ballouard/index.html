<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludovic Ballouard — Only The Present Moment Has A Meaning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bronze: #C4A484;
            --bronze-light: #D4B8A3;
            --bronze-dark: #9A7B5B;
            --void: #0D0C0B;
            --ivory: #F5F0EB;
            --charcoal: #1A1816;
            --ghost: rgba(245, 240, 235, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            background: var(--void);
            color: var(--ivory);
            font-weight: 300;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--void);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader-word {
            font-size: 12vw;
            letter-spacing: 2em;
            opacity: 0;
            filter: blur(30px);
            color: var(--bronze);
            white-space: nowrap;
        }
        .loader-sub {
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            opacity: 0;
            color: var(--ghost);
            margin-top: 4rem;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        #main-content {
            opacity: 0;
            transition: opacity 2s ease;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
        }
        #main-content.visible { opacity: 1; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* SECTION 1: GENESIS */
        #section1 {
            background: var(--void);
            align-items: center;
            justify-content: center;
        }
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.4;
            pointer-events: none;
        }
        .genesis-text {
            font-size: 28vh;
            color: var(--bronze);
            letter-spacing: 0.1em;
            transform: scaleY(1.5);
            z-index: 10;
            line-height: 0.8;
            white-space: nowrap;
            margin-top: -5vh;
        }
        .genesis-year {
            position: absolute;
            bottom: 8%;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--ghost);
            text-transform: uppercase;
        }

        /* SECTION 2: WATCHMAKER */
        #section2 {
            background: var(--void);
            align-items: center;
            justify-content: center;
        }
        .typewriter-container { text-align: center; z-index: 10; }
        .typewriter-text {
            font-size: 15vh;
            color: var(--ivory);
            letter-spacing: 0.15em;
            line-height: 1.2;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 0.8em;
            background: var(--bronze);
            margin-left: 0.1em;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .typewriter-sub {
            font-size: 1rem;
            letter-spacing: 0.3em;
            color: var(--bronze);
            margin-top: 2rem;
            opacity: 0;
            text-transform: uppercase;
        }
        .typewriter-year {
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--ghost);
            margin-top: 1rem;
            opacity: 0;
            text-transform: uppercase;
        }

        /* SECTION 3: PHILOSOPHY */
        #section3 {
            background: var(--ivory);
            flex-direction: row;
        }
        .mechanism-side {
            width: 45%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #disc-canvas { width: 350px; height: 350px; }
        .philosophy-side {
            width: 55%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3vh;
        }
        .time-label {
            font-size: 12vh;
            letter-spacing: 0.1em;
        }
        .time-label.past, .time-label.future {
            color: rgba(26, 24, 22, 0.15);
            transform: rotate(180deg);
        }
        .time-label.present {
            color: var(--bronze-dark);
            font-size: 18vh;
            transform: scaleY(1.3);
        }

        /* SECTION 4: CRAFT */
        #section4 {
            background: var(--void);
            align-items: center;
            justify-content: center;
        }
        #svg-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
        }
        .craft-line {
            fill: none;
            stroke: var(--bronze);
            stroke-width: 0.5;
            stroke-linecap: round;
            opacity: 0.3;
        }
        .craft-text {
            font-size: 20vh;
            color: var(--bronze);
            letter-spacing: 0.15em;
            z-index: 1;
            transform: scaleY(1.4);
            mix-blend-mode: difference;
        }
        .craft-labels {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
        }
        .craft-label {
            position: absolute;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--ghost);
            text-transform: uppercase;
        }

        /* SECTION 5: COMMISSION */
        #section5 {
            background: var(--ivory);
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #noise-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.15;
            pointer-events: none;
        }
        .commission-container {
            text-align: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }
        .commission-text {
            font-size: 22vh;
            color: var(--bronze-dark);
            letter-spacing: 0.1em;
            transform: scaleY(1.4);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 0.9;
        }
        .commission-text.hidden { opacity: 0; }
        .email-text {
            font-size: 18vh;
            color: var(--bronze-dark);
            letter-spacing: 0.08em;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scaleY(1.4);
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            pointer-events: none;
            line-height: 0.9;
        }
        .email-text.visible { opacity: 1; }
        .copied-feedback {
            position: absolute;
            bottom: -3rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            color: var(--bronze);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .copied-feedback.visible { opacity: 1; }
        .commission-footer {
            position: absolute;
            bottom: 8%;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: rgba(26, 24, 22, 0.4);
            text-transform: uppercase;
        }

        .scroll-hint {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--ghost);
            text-transform: uppercase;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .scroll-hint.visible { opacity: 0.5; }
    </style>
</head>
<body>
    <!-- LOADER -->
    <div id="loader">
        <div class="loader-word" id="loaderWord">BALLOUARD</div>
        <div class="loader-sub" id="loaderSub">Geneva MMXXVI</div>
    </div>
    <div class="scroll-hint" id="scrollHint">Scroll</div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        
        <!-- SECTION 1: GENESIS -->
        <section id="section1">
            <canvas id="particle-canvas"></canvas>
            <div class="genesis-text">BALLOUARD</div>
            <div class="genesis-year">Geneva MMXXVI</div>
        </section>

        <!-- SECTION 2: WATCHMAKER -->
        <section id="section2">
            <div class="typewriter-container">
                <div class="typewriter-text">
                    <span id="typewriter-content"></span><span class="typewriter-cursor"></span>
                </div>
                <div class="typewriter-sub" id="typewriterSub">Founder & Watchmaker</div>
                <div class="typewriter-year" id="typewriterYear">Since 2009</div>
            </div>
        </section>

        <!-- SECTION 3: PHILOSOPHY -->
        <section id="section3">
            <div class="mechanism-side">
                <canvas id="disc-canvas"></canvas>
            </div>
            <div class="philosophy-side">
                <div class="time-label past">PAST</div>
                <div class="time-label present">PRESENT</div>
                <div class="time-label future">FUTURE</div>
            </div>
        </section>

        <!-- SECTION 4: CRAFT -->
        <section id="section4">
            <svg id="svg-container" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path class="craft-line" d="M10,30 Q30,25 50,30 T90,30" />
                <path class="craft-line" d="M5,50 Q35,45 65,50 T95,50" />
                <path class="craft-line" d="M15,70 Q40,65 60,70 T85,70" />
                <path class="craft-line" d="M20,20 L20,80" />
                <path class="craft-line" d="M80,15 L80,85" />
                <path class="craft-line" d="M40,10 Q40,50 40,90" />
                <path class="craft-line" d="M60,5 Q60,50 60,95" />
                <circle class="craft-line" cx="30" cy="40" r="8" />
                <circle class="craft-line" cx="70" cy="60" r="12" />
                <circle class="craft-line" cx="50" cy="75" r="6" />
            </svg>
            <div class="craft-text">HAND ENGRAVED</div>
            <div class="craft-labels">
                <div class="craft-label" style="top: 20%; left: 10%;">CASE</div>
                <div class="craft-label" style="top: 35%; right: 12%;">CROWN</div>
                <div class="craft-label" style="bottom: 30%; left: 15%;">BUCKLE</div>
                <div class="craft-label" style="bottom: 20%; right: 10%;">GENEVA</div>
            </div>
        </section>

        <!-- SECTION 5: COMMISSION -->
        <section id="section5">
            <canvas id="noise-canvas"></canvas>
            <div class="commission-container" id="commissionContainer">
                <div class="commission-text" id="commissionText">COMMISSION</div>
                <div class="email-text" id="emailText">INFO@BALLOUARD.COM</div>
                <div class="copied-feedback" id="copiedFeedback">Copied to clipboard</div>
            </div>
            <div class="commission-footer">MMXXVI L'ATELIER BALLOUARD, GENEVE</div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        // LOADER SEQUENCE
        const loader = document.getElementById('loader');
        const loaderWord = document.getElementById('loaderWord');
        const loaderSub = document.getElementById('loaderSub');
        const mainContent = document.getElementById('main-content');
        const scrollHint = document.getElementById('scrollHint');

        function runLoader() {
            const tl = gsap.timeline();
            tl.to(loaderWord, { letterSpacing: '0.15em', opacity: 0.9, filter: 'blur(0px)', duration: 5, ease: 'power2.out' });
            tl.to(loaderSub, { opacity: 0.6, duration: 1.5, ease: 'power2.out' }, '-=1');
            tl.to({}, { duration: 1 }); // Hold
            tl.to(loaderWord, { letterSpacing: '3em', opacity: 0, filter: 'blur(20px)', duration: 1.5, ease: 'power2.inOut' });
            tl.to(loaderSub, { opacity: 0, duration: 1, ease: 'power2.inOut' }, '-=1');
            tl.add(() => {
                loader.style.display = 'none';
                mainContent.classList.add('visible');
                scrollHint.classList.add('visible');
                setTimeout(() => scrollHint.classList.remove('visible'), 5000);
                initSectionAnimations();
            });
        }
        window.addEventListener('load', runLoader);

        // SECTION 1: PARTICLES
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const particles = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + Math.random() * 100;
                    this.size = Math.random() * 2 + 0.5;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.y -= this.speed;
                    if (this.y < -10) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(196, 164, 132, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 25; i++) particles.push(new Particle());

            let frameCount = 0;
            function animate() {
                frameCount++;
                if (frameCount % 2 === 0) {
                    ctx.clearRect(0, 0, width, height);
                    particles.forEach(p => { p.update(); p.draw(); });
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // SECTION 2: TYPEWRITER
        let typewriterStarted = false;
        function initTypewriter() {
            if (typewriterStarted) return;
            typewriterStarted = true;
            const content = document.getElementById('typewriter-content');
            const sub = document.getElementById('typewriterSub');
            const year = document.getElementById('typewriterYear');
            const text = 'LUDOVIC BALLOUARD';
            let index = 0;

            function type() {
                if (index < text.length) {
                    content.textContent += text.charAt(index);
                    index++;
                    setTimeout(type, 150);
                } else {
                    gsap.to(sub, { opacity: 0.7, duration: 1.5, delay: 0.5 });
                    gsap.to(year, { opacity: 0.5, duration: 1.5, delay: 1 });
                }
            }
            type();
        }

        // SECTION 3: DISC
        function initDisc() {
            const canvas = document.getElementById('disc-canvas');
            const ctx = canvas.getContext('2d');
            const size = 350;
            canvas.width = size;
            canvas.height = size;
            let rotation = 0;
            const cx = size / 2, cy = size / 2, radius = 140;

            function draw() {
                ctx.clearRect(0, 0, size, size);
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(196, 164, 132, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(196, 164, 132, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                for (let i = 1; i <= 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + rotation;
                    const x = cx + Math.cos(angle) * (radius - 30);
                    const y = cy + Math.sin(angle) * (radius - 30);
                    ctx.save();
                    ctx.translate(x, y);
                    const textRotation = angle - rotation - Math.PI / 2;
                    ctx.rotate(textRotation);
                    ctx.font = '24px Cormorant Garamond';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const isCurrent = Math.abs((angle - rotation + Math.PI / 2) % (Math.PI * 2)) < 0.3;
                    ctx.fillStyle = isCurrent ? '#9A7B5B' : 'rgba(154, 123, 91, 0.2)';
                    ctx.fillText(i.toString(), 0, 0);
                    ctx.restore();
                }

                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#C4A484';
                ctx.fill();

                rotation += 0.002;
                requestAnimationFrame(draw);
            }
            draw();
        }

        // SECTION 4: SVG
        function initSvg() {
            const lines = document.querySelectorAll('.craft-line');
            lines.forEach((line, i) => {
                const length = line.getTotalLength ? line.getTotalLength() : 200;
                line.style.strokeDasharray = length;
                line.style.strokeDashoffset = length;
                gsap.to(line, {
                    strokeDashoffset: 0,
                    duration: 4,
                    delay: i * 0.4,
                    ease: 'power2.inOut',
                    scrollTrigger: { trigger: '#section4', start: 'top center', toggleActions: 'play none none reverse' }
                });
            });
            gsap.utils.toArray('.craft-label').forEach((label, i) => {
                gsap.fromTo(label, { opacity: 0 }, {
                    opacity: 0.4,
                    duration: 2,
                    delay: 2 + (i * 0.3),
                    scrollTrigger: { trigger: '#section4', start: 'top center', toggleActions: 'play none none reverse' }
                });
            });
        }

        // SECTION 5: COMMISSION
        function initCommission() {
            const container = document.getElementById('commissionContainer');
            const commissionText = document.getElementById('commissionText');
            const emailText = document.getElementById('emailText');
            const feedback = document.getElementById('copiedFeedback');

            container.addEventListener('mouseenter', () => {
                commissionText.classList.add('hidden');
                emailText.classList.add('visible');
            });
            container.addEventListener('mouseleave', () => {
                commissionText.classList.remove('hidden');
                emailText.classList.remove('visible');
            });
            container.addEventListener('click', () => {
                navigator.clipboard.writeText('info@ballouard.com').then(() => {
                    feedback.classList.add('visible');
                    setTimeout(() => feedback.classList.remove('visible'), 2000);
                });
            });
        }

        // NOISE
        function initNoise() {
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            let frameCount = 0;
            function draw() {
                frameCount++;
                if (frameCount % 3 === 0) {
                    const imageData = ctx.createImageData(width, height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const value = Math.random() * 255;
                        data[i] = value;
                        data[i + 1] = value;
                        data[i + 2] = value;
                        data[i + 3] = 12;
                    }
                    ctx.putImageData(imageData, 0, 0);
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        // INIT ALL
        function initSectionAnimations() {
            initParticles();
            ScrollTrigger.create({ trigger: '#section2', start: 'top center', onEnter: initTypewriter, once: true });
            ScrollTrigger.create({ trigger: '#section3', start: 'top center', onEnter: initDisc, once: true });
            initSvg();
            initCommission();
            initNoise();
        }

        // KEYBOARD NAV
        document.addEventListener('keydown', (e) => {
            const scrollContainer = document.getElementById('main-content');
            const sections = document.querySelectorAll('section');
            const scrollTop = scrollContainer.scrollTop;
            const viewportHeight = window.innerHeight;
            const currentSection = Math.round(scrollTop / viewportHeight);
            
            if (e.key === 'ArrowDown' && currentSection < sections.length - 1) {
                sections[currentSection + 1].scrollIntoView({ behavior: 'smooth' });
            } else if (e.key === 'ArrowUp' && currentSection > 0) {
                sections[currentSection - 1].scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
