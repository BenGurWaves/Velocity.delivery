<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Silk Handshake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#000; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .grain-overlay { position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.03; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    
    #silkCanvas { position:absolute; inset:0; z-index:1; width:100%; height:100%; }
    
    .text-layer { position:relative; z-index:10; pointer-events:none; }
    .letter { display:inline-block; font-family:var(--serif); font-size:clamp(3rem, 10vw, 8rem); font-style:italic; line-height:1; opacity:0; color:var(--sand); filter: blur(10px); will-change:transform, opacity, filter; }
    
    .status-line { position:fixed; bottom:6vh; left:50%; transform:translateX(-50%); font-family:var(--sans); text-transform:uppercase; letter-spacing:1em; font-size:0.5rem; color:var(--brass); opacity:0; z-index:10; }

    .ping-flash { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="grain-overlay"></div>
<div class="ping-flash" id="flash"></div>
<canvas id="silkCanvas"></canvas>

<div class="text-layer" id="textLayer"></div>
<div class="status-line" id="statusLine">The Silk Handover</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('silkCanvas'), ctx = canvas.getContext('2d');
  let w, h, mouse = { x: -1000, y: -1000 }, targetMouse = { x: -1000, y: -1000 };
  
  function rs() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();
  window.addEventListener('mousemove', e => { targetMouse.x = e.clientX; targetMouse.y = e.clientY; });

  // Verlet Physics Settings
  const numPoints = 60;
  const segmentLength = 20;
  const gravity = 0.05;
  const friction = 0.98;
  const points = [];
  
  for(let i=0; i<numPoints; i++) {
    points.push({ x: w/2, y: h/2, oldX: w/2, oldY: h/2 });
  }

  // The Weave Mode (0: Abstract, 1: Circle)
  let weaveMode = 0;
  let circleProgress = 0;

  function update() {
    // Smooth mouse
    mouse.x += (targetMouse.x - mouse.x) * 0.1;
    mouse.y += (targetMouse.y - mouse.y) * 0.1;

    // First point follows mouse (if close) or center
    const first = points[0];
    if (weaveMode === 0) {
      const dx = mouse.x - first.x, dy = mouse.y - first.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 300) {
        first.x += dx * 0.1;
        first.y += dy * 0.1;
      } else {
        first.x += (w/2 - first.x) * 0.01;
        first.y += (h/2 - first.y) * 0.01;
      }
    } else {
      // Circle Weave logic
      const time = Date.now() * 0.002;
      first.x = w/2 + Math.cos(time) * (150 * circleProgress);
      first.y = h/2 + Math.sin(time) * (150 * circleProgress);
    }

    // Verlet integration
    for(let i=0; i<numPoints; i++) {
      const p = points[i];
      const vx = (p.x - p.oldX) * friction;
      const vy = (p.y - p.oldY) * friction;
      p.oldX = p.x; p.oldY = p.y;
      p.x += vx; p.y += vy;
      p.y += gravity;
    }

    // Constraints
    for(let j=0; j<10; j++) {
      for(let i=0; i<numPoints-1; i++) {
        const p1 = points[i], p2 = points[i+1];
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const diff = (segmentLength - dist) / dist * 0.5;
        const ox = dx * diff, oy = dy * diff;
        p1.x -= ox; p1.y -= oy;
        p2.x += ox; p2.y += oy;
      }
    }
  }

  function draw() {
    ctx.clearRect(0,0,w,h);
    
    // Draw the liquid gold thread
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1; i<numPoints; i++) {
      const xc = (points[i].x + points[i-1].x) / 2;
      const yc = (points[i].y + points[i-1].y) / 2;
      ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, xc, yc);
    }
    
    const grad = ctx.createLinearGradient(0,0,w,h);
    grad.addColorStop(0, '#C49C7B');
    grad.addColorStop(0.5, '#DEC8B5');
    grad.addColorStop(1, '#C49C7B');
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.8;
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'rgba(196,156,123,0.5)';
    ctx.stroke();

    // Micro-particles trail
    for(let i=0; i<numPoints; i+=4) {
      if(Math.random() > 0.8) {
        ctx.fillStyle = 'rgba(222,200,181,0.2)';
        ctx.beginPath();
        ctx.arc(points[i].x + (Math.random()-0.5)*10, points[i].y + (Math.random()-0.5)*10, Math.random()*1, 0, 6.28);
        ctx.fill();
      }
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();

  // Cinematic Experience Timeline
  const tl = gsap.timeline();
  
  // 1. Initial Breath
  tl.to('#statusLine', { opacity: 0.4, duration: 2, ease: 'power2.inOut' }, 0.5);
  
  // 2. Kinetic Precipitation
  const msg = "Returning to the Salon.";
  const layer = document.getElementById('textLayer');
  msg.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'letter';
    span.innerText = char === ' ' ? '\u00A0' : char;
    layer.appendChild(span);
    
    tl.to(span, { 
      opacity: 1, 
      filter: 'blur(0px)', 
      y: (Math.random()-0.5)*20, 
      duration: 2, 
      ease: 'expo.out' 
    }, 1 + (i * 0.1));
  });

  // 3. Initiate Circle Weave
  tl.to({}, { duration: 2, onStart: () => { weaveMode = 1; } }, 2);
  tl.to({v:0}, { v:1, duration: 3, onUpdate: function() { circleProgress = this.targets()[0].v; } }, 2);

  // 4. Final Flash & Redirect
  tl.to('#flash', { opacity: 1, duration: 0.8, ease: 'power2.in' }, 6);
  tl.to('body', { opacity: 0, duration: 0.1 }, 6.8);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 7);
});
</script>
</body>
</html>
