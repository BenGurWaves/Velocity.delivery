<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Hyperleap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#000; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .void-grain { position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.04; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    
    #warpCanvas { position:absolute; inset:0; z-index:1; width:100%; height:100%; }
    
    .peace-layer { position:relative; z-index:10; pointer-events:none; display:flex; flex-direction:column; align-items:center; opacity:0; }
    .atelier-core { width:1px; height:60px; background:var(--brass); margin-bottom:2rem; }
    .peace-title { font-family:var(--serif); font-size:clamp(1.5rem, 3vw, 2.8rem); font-style:italic; font-weight:400; color:var(--sand); text-align:center; }
    
    .status-tag { position:fixed; top:4vh; left:50%; transform:translateX(-50%); font-family:var(--sans); text-transform:uppercase; letter-spacing:1em; font-size:0.5rem; color:rgba(222,200,181,0.3); z-index:10; }

    .fade-out { position:fixed; inset:0; z-index:1000; background:#000; opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="void-grain"></div>
<div class="fade-out" id="fade"></div>
<span class="status-tag">Hyperleap engaged</span>
<canvas id="warpCanvas"></canvas>

<div class="peace-layer" id="peace">
  <div class="atelier-core"></div>
  <h2 class="peace-title">Digital Atelier Ready</h2>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('warpCanvas'), ctx = canvas.getContext('2d');
  let w, h;
  function rs() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();

  // 3D Particles & Fragments
  const particles = [];
  const numParticles = 400;
  function initParticles() {
    for(let i=0; i<numParticles; i++) {
      particles.push({
        x: (Math.random() - 0.5) * 2000,
        y: (Math.random() - 0.5) * 2000,
        z: Math.random() * 2000,
        oZ: Math.random() * 2000, // original Z
        size: Math.random() * 2 + 0.5,
        type: Math.random() > 0.8 ? 'fragment' : 'streak'
      });
    }
  }
  initParticles();

  let globalSpeed = 60; // Hyperleap speed
  let speedFactor = 1;

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.lineCap = 'round';
    
    const perspective = 500;
    const centerX = w / 2;
    const centerY = h / 2;

    for(let i=0; i<numParticles; i++) {
      const p = particles[i];
      p.z -= globalSpeed * speedFactor;
      
      if(p.z <= 0) {
        p.z = 2000;
        p.x = (Math.random() - 0.5) * 2000;
        p.y = (Math.random() - 0.5) * 2000;
      }

      const f = perspective / p.z;
      const x = centerX + p.x * f;
      const y = centerY + p.y * f;

      if(x < 0 || x > w || y < 0 || y > h) continue;

      const alpha = Math.min(1, (2000 - p.z) / 1000);
      
      if(p.type === 'streak' && speedFactor > 0.1) {
        // High speed streak
        const prevZ = p.z + (globalSpeed * speedFactor * 4);
        const pf = perspective / prevZ;
        const px = centerX + p.x * pf;
        const py = centerY + p.y * pf;
        
        ctx.beginPath();
        ctx.strokeStyle = `rgba(196,156,123,${alpha * 0.4})`;
        ctx.lineWidth = 1;
        ctx.moveTo(x, y);
        ctx.lineTo(px, py);
        ctx.stroke();
      } else {
        // Geometric fragment
        ctx.fillStyle = `rgba(222,200,181,${alpha * 0.6})`;
        const s = p.size * f;
        ctx.fillRect(x, y, s, s);
      }
    }
    requestAnimationFrame(draw);
  }
  draw();

  // Cinematic Timeline
  const tl = gsap.timeline();
  
  // 1. Peak Speed Duration (0-2.5s)
  tl.to({}, { duration: 2.5 });

  // 2. The Abrupt Brake (2.5s - 3s)
  tl.to({v:1}, { 
    v:0, 
    duration: 0.8, 
    onUpdate: function() { speedFactor = this.targets()[0].v; },
    ease: 'expo.out'
  }, 2.8);

  // 3. Peace Sequence (3s - 5s)
  tl.to(canvas, { opacity: 0, duration: 1.5 }, 3.5);
  tl.to('#peace', { opacity: 1, y: -20, duration: 1.5, ease: 'expo.out' }, 3.5);

  // 4. Final Handoff
  tl.to('#fade', { opacity: 1, duration: 1 }, 5.5);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 6.5);
});
</script>
</body>
</html>
