<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Kinetic Numeral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .atelier-grid { position:fixed; inset:0; z-index:1; opacity:0.1; pointer-events:none; }
    
    #kineticCanvas { position:absolute; inset:0; z-index:10; width:100%; height:100%; transition: opacity 2s ease; }
    
    .interface-layer { position:relative; z-index:20; pointer-events:none; display:flex; flex-direction:column; align-items:center; }
    .status-msg { font-family:var(--sans); text-transform:uppercase; letter-spacing:1.2em; font-size:0.55rem; color:rgba(222,200,181,0.4); margin-top:20vh; opacity:0; }
    
    .final-shimmer { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas class="atelier-grid" id="gridCanvas"></canvas>
<canvas id="kineticCanvas"></canvas>
<div class="final-shimmer" id="shimmer"></div>

<div class="interface-layer">
  <span class="status-msg" id="sMsg">Returning to Primary Source</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('kineticCanvas'), ctx = canvas.getContext('2d');
  const gCanvas = document.getElementById('gridCanvas'), gCtx = gCanvas.getContext('2d');
  let w, h;
  
  function rs() { 
    w = canvas.width = gCanvas.width = window.innerWidth; 
    h = canvas.height = gCanvas.height = window.innerHeight; 
    drawGrid();
  }
  window.addEventListener('resize', rs); rs();

  function drawGrid() {
    gCtx.clearRect(0,0,w,h);
    gCtx.strokeStyle = 'rgba(196,156,123,0.3)';
    gCtx.lineWidth = 0.5;
    const step = 80;
    for(let x=0; x<w; x+=step) { gCtx.beginPath(); gCtx.moveTo(x,0); gCtx.lineTo(x,h); gCtx.stroke(); }
    for(let y=0; y<h; y+=step) { gCtx.beginPath(); gCtx.moveTo(0,y); gCtx.lineTo(w,y); gCtx.stroke(); }
  }

  // Kinetic Typography Logic
  let count = 5;
  let shearX = 0;
  let stretchX = 1;
  let textAlpha = 0;
  let trails = [];
  
  function drawNumeral() {
    ctx.clearRect(0, 0, w, h);
    
    ctx.font = `italic 400 ${Math.min(w, h) * 0.8}px "Instrument Serif"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Trail handling
    trails.push({ shear: shearX, stretch: stretchX, alpha: textAlpha });
    if(trails.length > 15) trails.shift();
    
    ctx.globalCompositeOperation = 'lighter';
    
    trails.forEach((t, i) => {
      ctx.save();
      ctx.translate(w/2, h/2);
      ctx.transform(t.stretch, 0, t.shear, 1, 0, 0);
      ctx.globalAlpha = t.alpha * (i/trails.length) * 0.2;
      ctx.fillStyle = '#C49C7B';
      ctx.fillText(count, 0, 0);
      ctx.restore();
    });

    // Primary Numeral
    ctx.save();
    ctx.translate(w/2, h/2);
    ctx.transform(stretchX, 0, shearX, 1, 0, 0);
    ctx.globalAlpha = textAlpha;
    ctx.fillStyle = '#DEC8B5';
    ctx.fillText(count, 0, 0);
    ctx.restore();

    requestAnimationFrame(drawNumeral);
  }
  drawNumeral();

  // THE MASTERPIECE TIMELINE
  const tl = gsap.timeline();
  
  // Fade in sequence
  tl.to({a:0}, { a:1, duration: 2, onUpdate: function() { textAlpha = this.targets()[0].a; }, ease: 'power2.inOut' });
  tl.to('#sMsg', { opacity: 1, y: -20, duration: 2, ease: 'expo.out' }, 0.5);

  // The Kinetic Countdown
  const numbers = [5, 4, 3, 2, 1];
  numbers.forEach((num, i) => {
    // Each count triggers a shear/liquidation
    tl.to({}, { 
      duration: 1, 
      onStart: () => {
        // Liquidation Animation
        gsap.fromTo({sX: 0, str: 1}, { 
          sX: 2, 
          str: 2.5,
          duration: 0.4, 
          onUpdate: function() { 
            shearX = this.targets()[0].sX; 
            stretchX = this.targets()[0].str;
          },
          ease: 'expo.in',
          onComplete: () => {
            count = num;
            gsap.to({sX: 2, str: 2.5}, { 
              sX: 0, 
              str: 1,
              duration: 0.6,
              onUpdate: function() { 
                shearX = this.targets()[0].sX; 
                stretchX = this.targets()[0].str;
              },
              ease: 'expo.out'
            });
          }
        });
      }
    });
  });

  // Final Dispersion
  tl.to({a:1, sX: 0, str: 1}, { 
    a:0, 
    sX: 5, 
    str: 10, 
    duration: 1.5, 
    onUpdate: function() { 
      textAlpha = this.targets()[0].a;
      shearX = this.targets()[0].sX;
      stretchX = this.targets()[0].str;
    }, 
    ease: 'expo.in' 
  });
  
  tl.to('#shimmer', { opacity: 1, duration: 1.2, ease: 'power2.inOut' }, '-=0.5');
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, '+=0.2');
});
</script>
</body>
</html>
