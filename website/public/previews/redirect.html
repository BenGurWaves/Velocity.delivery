<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Shutter Monolith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; }
    
    #heroCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .archive-header { position:fixed; top:4vh; left:6vw; font-family:var(--sans); text-transform:uppercase; letter-spacing:0.8em; font-size:0.5rem; color:var(--brass); opacity:0.3; pointer-events:none; }
    
    #shimmer { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas id="heroCanvas"></canvas>
<div id="shimmer"></div>
<div class="archive-header">Archive 8442 — Handover Term</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('heroCanvas'), ctx = canvas.getContext('2d');
  let w, h;
  
  function rs() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();

  // 1. Warp Corridor Background
  const lines = [];
  for(let i=0; i<60; i++) lines.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*20 + 10, a: Math.random()*0.15 });

  let count = '5';
  let glitch = 0; // The Shutter Flash amount
  let settleScale = 1;
  let settleAlpha = 1;

  function render() {
    ctx.fillStyle = '#0D0C09';
    ctx.fillRect(0,0,w,h);
    
    // Draw Warp Lines
    ctx.strokeStyle = 'rgba(196, 156, 123, 0.1)';
    ctx.lineWidth = 1;
    lines.forEach(l => {
      l.y += l.s;
      if(l.y > h) l.y = -100;
      ctx.beginPath();
      ctx.moveTo(l.x, l.y);
      ctx.lineTo(l.x, l.y + 100);
      ctx.globalAlpha = l.a;
      ctx.stroke();
    });

    // DRAW THE HERO NUMERAL (The "Impossible to Miss" Centerpiece)
    const drawText = (offsetX = 0, color = '#DEC8B5', alpha = settleAlpha) => {
      ctx.save();
      ctx.translate(w/2 + offsetX + (Math.random()-0.5)*glitch*20, h/2 + (Math.random()-0.5)*glitch*20);
      ctx.scale(settleScale, settleScale);
      ctx.globalAlpha = alpha;
      ctx.font = `italic 400 ${Math.min(w, h) * 0.7}px "Instrument Serif"`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(count, 0, 0);
      ctx.restore();
    };

    if (glitch > 0) {
      // Chromatic Aberration Shutter Flash
      drawText(-glitch*30, '#F00', 0.4);
      drawText(glitch*30, '#0FF', 0.4);
    }
    drawText();

    requestAnimationFrame(render);
  }
  render();

  const tl = gsap.timeline();
  
  // THE SHUTTER COUNTDOWN (5-4-3-2-1)
  const nums = ['4', '3', '2', '1', '0'];
  nums.forEach(num => {
    tl.to({}, { 
      duration: 1.2, 
      onStart: () => {
        // Dramatic Shutter Transition
        gsap.fromTo({g: 1, s: 1.1, a: 0.5}, {
          g: 0, s: 1, a: 1,
          duration: 0.6,
          onUpdate: function() {
            glitch = this.targets()[0].g;
            settleScale = this.targets()[0].s;
            settleAlpha = this.targets()[0].a;
          },
          ease: 'expo.out',
          onStart: () => { count = num; }
        });
      }
    });
  });

  // FINAL SHUTTER & HANDOFF
  tl.to('#shimmer', { opacity: 1, duration: 1.2, ease: 'expo.in' }, '+=0.6');
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, '+=0.1');
});
</script>
</body>
</html>
