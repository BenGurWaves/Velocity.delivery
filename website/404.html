<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Velocity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&family=Caveat:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #12100e;
      color: #e8ddd3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }
    .wrap { max-width: 420px; padding: 2rem; position: relative; }
    .code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 7rem;
      font-weight: 400;
      line-height: 1;
      color: #c8956a;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    p {
      color: #a89f94;
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #c8956a;
      color: #12100e;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      transition: background 0.3s, transform 0.3s;
    }
    a:hover { background: #d4a57a; transform: translateY(-1px); }
    .note {
      font-family: 'Caveat', cursive;
      color: #c8956a;
      font-size: 1.1rem;
      opacity: 0.6;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <p class="note">wrong turn, happens to the best of us</p>
    <h1>This page doesn't exist.</h1>
    <p>Whatever you were looking for has moved, been removed, or never existed in the first place.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
