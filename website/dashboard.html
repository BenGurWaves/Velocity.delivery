<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Dashboard — Velocity</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0C09;--bg2:#121109;--sand:#DEC8B5;--brass:#C49C7B;--dim:#565250;--muted:#252320;--border:rgba(222,200,181,.07);--bord2:rgba(222,200,181,.13);--ease:cubic-bezier(0.16,1,0.3,1);--px:clamp(1.75rem,5vw,5.5rem)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--sand);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}button{font-family:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:1px solid var(--brass);outline-offset:4px}
.grain{position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.87' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;z-index:9000;animation:gr .5s steps(2) infinite}
@keyframes gr{0%{transform:translate(0,0)}25%{transform:translate(-2%,-2%)}50%{transform:translate(2%,1%)}75%{transform:translate(-1%,3%)}}
.nav{position:fixed;inset:0 0 auto;height:64px;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;background:rgba(13,12,9,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100}
.nav-brand{font-family:'Instrument Serif',Georgia,serif;font-size:1.1rem;letter-spacing:-.02em}.nav-brand em{font-style:normal;color:var(--brass)}
.nav-right{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.wrap{max-width:700px;margin:0 auto;padding:100px var(--px) 80px}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1.5rem;text-align:center}
.state h2{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(1.8rem,3vw,2.8rem);letter-spacing:-.03em}
.state p{font-size:.82rem;color:var(--dim);line-height:1.8;max-width:38ch}
.badge{display:inline-flex;align-items:center;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;padding:.35rem .85rem;border:1px solid}
.badge-pending{color:var(--dim);border-color:var(--bord2)}.badge-accepted{color:#8fc98f;border-color:rgba(143,201,143,.3)}
.badge-in_progress{color:var(--brass);border-color:var(--bord2)}.badge-declined{color:#c08080;border-color:rgba(192,128,128,.3)}
.badge-completed,.badge-paid{color:#8fc98f;border-color:rgba(143,201,143,.3)}
.dash-hero{padding:clamp(2rem,4vw,4rem) 0 clamp(3rem,5vw,5rem);border-bottom:1px solid var(--border)}
.dash-greeting{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:1rem}
.dash-name{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(2.5rem,6vw,5rem);letter-spacing:-.04em;line-height:1}
.dash-sub{font-size:.8rem;color:var(--dim);margin-top:.75rem;line-height:1.8}
.dash-badges{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1.5rem}
.section{padding:clamp(2.5rem,4vw,4rem) 0;border-bottom:1px solid var(--border)}
.section-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin-bottom:1.5rem}
.kv-grid{display:grid;grid-template-columns:160px 1fr;gap:.75rem 2rem}
@media(max-width:500px){.kv-grid{grid-template-columns:1fr;gap:.25rem}}
.kv-key{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.kv-val{font-size:.82rem;color:var(--sand);font-weight:300;line-height:1.6}
.kv-sep{grid-column:1/-1;height:1px;background:var(--border);margin:.25rem 0}
.countdown-wrap{margin:1.5rem 0}
.countdown-label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem}
.countdown{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(2rem,5vw,4rem);letter-spacing:-.04em;line-height:1}
.countdown.urgent{color:#c08080}
.edit-link{display:inline-block;margin-top:1rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);border-bottom:1px solid var(--bord2);padding-bottom:2px}
.payment-box{border:1px solid var(--bord2);padding:clamp(1.5rem,3vw,2.5rem);margin-top:1.5rem}
.payment-amount{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(2.5rem,6vw,5rem);letter-spacing:-.04em;margin:1rem 0}
.payment-note{font-size:.75rem;color:var(--dim);line-height:1.7;margin-bottom:1.5rem}
.btn-pay{font-size:.72rem;letter-spacing:.08em;color:var(--bg);background:var(--sand);padding:.85rem 2.5rem;transition:background .3s;border:none;cursor:pointer}
.btn-pay:hover{background:var(--brass)}.btn-pay:disabled{opacity:.4;pointer-events:none}
.paid-box{border:1px solid rgba(143,201,143,.2);padding:1.5rem;margin-top:1.5rem;display:flex;align-items:center;gap:1rem}
.paid-icon{font-size:1.2rem;color:#8fc98f}
.paid-text h3{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:1.3rem;margin-bottom:.25rem}
.paid-text p{font-size:.75rem;color:var(--dim);line-height:1.6}
.tl-item{display:flex;align-items:flex-start;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.tl-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:.4rem}
.tl-dot.done{background:#8fc98f}.tl-dot.active{background:var(--brass)}
.tl-title{font-size:.78rem;color:var(--sand);font-weight:300}
.tl-sub{font-size:.62rem;color:var(--dim);margin-top:.2rem;letter-spacing:.04em}
</style>
</head>
<body>
<div class="grain"></div>
<nav class="nav"><a href="/" class="nav-brand">Velocity<em>.</em></a><span class="nav-right">Project Dashboard</span></nav>
<div class="wrap">
  <div class="state" id="stateLoading"><p style="font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)">Loading…</p></div>
  <div class="state" id="stateError" style="display:none"><h2>Link not found.</h2><p>Contact <a href="mailto:hello@calyvent.com" style="color:var(--brass)">hello@calyvent.com</a> for assistance.</p></div>
  <div id="dashContent" style="display:none"></div>
</div>
<script>
let TOKEN='';
(function(){const p=location.pathname.split('/').filter(Boolean);TOKEN=p[1]||'';})();
const STATUS_LABELS={pending:'Under Review',accepted:'Accepted',in_progress:'In Progress',declined:'Declined',completed:'Completed'};
const STATUS_BADGE={pending:'badge-pending',accepted:'badge-accepted',in_progress:'badge-in_progress',declined:'badge-declined',completed:'badge-completed'};
const TL=[{key:'submitted',label:'Brief Submitted',sub:'Your project brief has been received.'},{key:'accepted',label:'Project Accepted',sub:'We are taking on your project.'},{key:'paid',label:'Payment Received',sub:'Project is fully confirmed.'},{key:'in_progress',label:'Design & Build',sub:'Active development.'},{key:'completed',label:'Delivered',sub:'Your site is live.'}];
function show(id){document.getElementById(id).style.display=''}
function hide(id){document.getElementById(id).style.display='none'}
function fmt(cents){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(cents/100)}
function cdwn(submitted_at){const d=new Date(submitted_at).getTime()+86400000,n=Date.now(),diff=d-n;if(diff<=0)return null;return{h:Math.floor(diff/3600000),m:Math.floor(diff%3600000/60000),s:Math.floor(diff%60000/1000),diff};}
async function init(){
  if(!TOKEN){hide('stateLoading');show('stateError');return;}
  const justPaid=new URLSearchParams(location.search).get('paid')==='1';
  if(justPaid)history.replaceState({},'',location.pathname);
  let lead;
  try{const r=await fetch('/api/leads/'+TOKEN);if(!r.ok){hide('stateLoading');show('stateError');return;}lead=await r.json();}
  catch{hide('stateLoading');show('stateError');return;}
  hide('stateLoading');render(lead,justPaid);
}
function render(lead,justPaid=false){
  const p1=(lead.full_data&&lead.full_data.phase1)||{};
  const name=lead.client_name||p1.full_name||'Client';
  const paid=lead.is_paid,hasQuote=lead.quote_amount&&lead.quote_amount>0,declined=lead.status==='declined';
  const done=new Set();
  if(lead.submitted_at)done.add('submitted');
  if(['accepted','in_progress','completed'].includes(lead.status))done.add('accepted');
  if(paid)done.add('paid');
  if(['in_progress','completed'].includes(lead.status))done.add('in_progress');
  if(lead.status==='completed')done.add('completed');
  const tlHtml=TL.map(s=>`<div class="tl-item"><div class="tl-dot ${done.has(s.key)?'done':''}"></div><div><div class="tl-title">${s.label}</div><div class="tl-sub">${s.sub}</div></div></div>`).join('');
  let payHtml='';
  if(declined){payHtml=`<div class="section"><div class="section-label">Status</div><p style="font-size:.82rem;color:var(--dim);line-height:1.8">This project has been declined. Email <a href="mailto:hello@calyvent.com" style="color:var(--brass)">hello@calyvent.com</a> if you believe this is an error.</p></div>`;}
  else if(paid||justPaid){payHtml=`<div class="section"><div class="section-label">Payment</div><div class="paid-box"><div class="paid-icon">✓</div><div class="paid-text"><h3>Payment Received.</h3><p>Your project is confirmed and in queue. We’ll be in touch within 24 hours.</p></div></div></div>`;}
  else if(hasQuote){payHtml=`<div class="section"><div class="section-label">Your Quote</div><div class="payment-box"><p style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)">Project Investment</p><div class="payment-amount">${fmt(lead.quote_amount)}</div><p class="payment-note">Your custom project quote. Clicking below opens a secure Stripe checkout. Work begins after payment is confirmed.</p><button class="btn-pay" id="payBtn">Proceed to Payment →</button></div></div>`;}
  else if(lead.submitted_at){payHtml=`<div class="section"><div class="section-label">Next Step</div><p style="font-size:.82rem;color:var(--dim);line-height:1.8">We’re reviewing your brief. A custom quote will appear here once we’ve assessed your project.</p></div>`;}
  let cdHtml='';
  if(!lead.is_locked&&lead.submitted_at){cdHtml=`<div class="countdown-wrap"><div class="countdown-label">Editing window closes in</div><div class="countdown" id="countdown">Calculating…</div><a href="/onboard/${TOKEN}" class="edit-link">Edit brief →</a></div>`;}
  else if(lead.is_locked){cdHtml=`<div class="countdown-wrap"><div class="countdown-label">Brief Status</div><p style="font-size:.8rem;color:var(--dim)">Locked — the 24-hour editing window has passed.</p></div>`;}
  else{cdHtml=`<div class="countdown-wrap"><p style="font-size:.82rem;color:var(--dim)">Brief not yet submitted. <a href="/onboard/${TOKEN}" style="color:var(--brass);border-bottom:1px solid var(--bord2)">Complete your onboarding →</a></p></div>`;}
  const html=`<div class="dash-hero"><div class="dash-greeting">Your Project</div><div class="dash-name">${name}.</div><div class="dash-sub">Velocity by Calyvent — bespoke design &amp; engineering.</div><div class="dash-badges"><span class="badge ${STATUS_BADGE[lead.status]||'badge-pending'}">${STATUS_LABELS[lead.status]||'Pending'}</span>${paid?'<span class="badge badge-paid">Payment Confirmed</span>':''}${lead.upgrade_permission?'<span class="badge" style="color:var(--brass);border-color:var(--bord2)">Upgrade Approved</span>':''}</div></div><div class="section"><div class="section-label">Brief Window</div>${cdHtml}</div>${payHtml}<div class="section"><div class="section-label">Project Timeline</div><div>${tlHtml}</div></div>${lead.submitted_at?`<div class="section"><div class="section-label">Brief Summary</div><div class="kv-grid">${p1.company_name?`<div class="kv-key">Company</div><div class="kv-val">${p1.company_name}</div><div class="kv-sep"></div>`:''}<div class="kv-key">Email</div><div class="kv-val">${lead.client_email||p1.email||'—'}</div><div class="kv-sep"></div>${lead.due_date?`<div class="kv-key">Deadline</div><div class="kv-val">${new Date(lead.due_date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div><div class="kv-sep"></div>`:''}<div class="kv-key">Submitted</div><div class="kv-val">${new Date(lead.submitted_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}</div></div></div>`:''}<div style="padding:3rem 0;border-top:1px solid var(--border);margin-top:1rem"><p style="font-size:.62rem;color:var(--dim);letter-spacing:.04em">Questions? Email <a href="mailto:hello@calyvent.com" style="color:var(--sand);border-bottom:1px solid var(--bord2)">hello@calyvent.com</a> — we reply within 24 hours.</p></div>`;
  document.getElementById('dashContent').innerHTML=html;
  show('dashContent');
  const payBtn=document.getElementById('payBtn');
  if(payBtn)payBtn.onclick=async()=>{payBtn.disabled=true;payBtn.textContent='Redirecting…';try{const r=await fetch('/api/stripe/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN})});const d=await r.json();if(d.url)location.href=d.url;else{payBtn.disabled=false;payBtn.textContent='Proceed to Payment →';alert(d.error||'Error');}}catch{payBtn.disabled=false;payBtn.textContent='Proceed to Payment →';alert('Network error.');}};
  if(!lead.is_locked&&lead.submitted_at){const el=document.getElementById('countdown');function tick(){const c=cdwn(lead.submitted_at);if(!c){el.textContent='Locked';el.classList.add('urgent');return;}el.textContent=String(c.h).padStart(2,'0')+':'+String(c.m).padStart(2,'0')+':'+String(c.s).padStart(2,'0');if(c.diff<3600000)el.classList.add('urgent');}tick();setInterval(tick,1000);}
}
init();
</script>
</body>
</html>
