<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — Velocity</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/styles.css?v=7">
  <style>
    .project-timeline {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .timeline-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
    }
    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .timeline-dot.done { background: #16a34a; }
    .timeline-dot.active { background: var(--dusty-trail); animation: pulse 2s ease-in-out infinite; }
    .timeline-text { font-size: var(--font-small); color: var(--text-secondary); }
    .timeline-text.done { color: var(--text-muted); text-decoration: line-through; }
    .timeline-text.active { color: var(--text); font-weight: 500; }

    .project-preview-banner {
      display: block;
      margin-top: 16px;
      padding: 14px 20px;
      background: var(--bg-dark);
      color: var(--sandstone);
      font-size: var(--font-small);
      font-weight: 500;
      text-align: center;
      transition: background var(--dur-fast);
    }
    .project-preview-banner:hover { background: var(--woodland); }

    .success-banner {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      padding: 16px 20px;
      margin-bottom: var(--space-md);
      text-align: center;
    }
    .success-banner h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: #166534;
      margin-bottom: 4px;
    }
    .success-banner p {
      font-size: var(--font-small);
      color: #545048;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="dash-page">
    <nav class="dash-nav">
      <a href="/" class="dash-logo">Velocity<i>.</i></a>
      <div class="dash-user">
        <span class="dash-email" id="user-email"></span>
        <button class="dash-logout" onclick="logout()">Sign Out</button>
      </div>
    </nav>

    <div class="dash-content">
      <h1 class="dash-welcome">Your Projects</h1>
      <p class="dash-sub" id="dash-sub">Loading...</p>

      <div id="success-area"></div>
      <div id="projects" class="project-list"></div>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) { window.location.href = '/auth.html'; return; }
        const user = await res.json();
        document.getElementById('user-email').textContent = user.email;

        const params = new URLSearchParams(window.location.search);
        const checkout = params.get('checkout');
        if (checkout) {
          window.location.href = '/onboard.html?plan=' + checkout;
          return;
        }

        const payment = params.get('payment');
        if (payment === 'success') {
          document.getElementById('success-area').innerHTML = `
            <div class="success-banner">
              <h3>Payment confirmed</h3>
              <p>We've received your brief and we're starting work now. You'll see updates here as we build.</p>
            </div>
          `;
          // Clean URL
          history.replaceState(null, '', '/dashboard.html');
        }

        loadProjects();
      } catch {
        window.location.href = '/auth.html';
      }
    }

    function getTimeline(status) {
      const steps = [
        { key: 'queued', label: 'Brief received — starting design' },
        { key: 'in-progress', label: 'Building your website' },
        { key: 'review', label: 'Ready for your review' },
        { key: 'live', label: 'Live and deployed' },
      ];
      const order = ['queued', 'in-progress', 'review', 'live'];
      const currentIndex = order.indexOf(status);

      return steps.map((step, i) => {
        let cls = '';
        if (i < currentIndex) cls = 'done';
        else if (i === currentIndex) cls = 'active';
        return `
          <div class="timeline-step">
            <div class="timeline-dot ${cls}"></div>
            <span class="timeline-text ${cls}">${step.label}</span>
          </div>
        `;
      }).join('');
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects');
        if (!res.ok) throw new Error();
        const data = await res.json();
        const projects = data.projects || [];

        if (projects.length === 0) {
          document.getElementById('dash-sub').textContent = 'No projects yet.';
          document.getElementById('projects').innerHTML = `
            <div class="empty-state">
              <h3>Ready to build something?</h3>
              <p>Pick a plan and we'll design your website.</p>
              <a href="/#pricing" class="price-btn" style="display:inline-block;padding:12px 28px;text-decoration:none;background:var(--text);color:var(--white);border:1px solid var(--text);">View Plans</a>
            </div>
          `;
          return;
        }

        document.getElementById('dash-sub').textContent = projects.length + ' project' + (projects.length === 1 ? '' : 's');

        const statusLabels = {
          queued: 'Queued',
          'in-progress': 'In Progress',
          review: 'Ready for Review',
          live: 'Live',
        };
        const statusClasses = {
          queued: 'status-queued',
          'in-progress': 'status-in-progress',
          review: 'status-review',
          live: 'status-live',
        };

        document.getElementById('projects').innerHTML = projects.map(p => `
          <div class="project-card">
            <div class="project-header">
              <div class="project-name">${esc(p.name || 'Untitled Project')}</div>
              <span class="project-status ${statusClasses[p.status] || 'status-queued'}">${statusLabels[p.status] || p.status}</span>
            </div>
            <div class="project-meta">Created ${new Date(p.created_at).toLocaleDateString()}</div>
            <div class="project-timeline">
              ${getTimeline(p.status)}
            </div>
            ${p.preview_url ? '<a href="' + esc(p.preview_url) + '" target="_blank" class="project-preview-banner">View Your Website Preview &rarr;</a>' : ''}
          </div>
        `).join('');

      } catch {
        document.getElementById('dash-sub').textContent = 'No projects yet.';
        document.getElementById('projects').innerHTML = `
          <div class="empty-state">
            <h3>Ready to build something?</h3>
            <p>Pick a plan and we'll design your website.</p>
            <a href="/#pricing" class="price-btn" style="display:inline-block;padding:12px 28px;text-decoration:none;background:var(--text);color:var(--white);border:1px solid var(--text);">View Plans</a>
          </div>
        `;
      }
    }

    async function logout() {
      try { await fetch('/api/auth/logout', { method: 'POST' }); } catch {}
      window.location.href = '/auth.html';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    init();
  </script>

</body>
</html>
